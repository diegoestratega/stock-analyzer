<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Fundamentals Analyzer</title>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    :root{
      --bg: #0f172a; --surface:#1e293b; --text:#f8fafc; --muted:#94a3b8;
      --border:#334155; --primary:#3b82f6; --success:#22c55e; --danger:#ef4444;
    }
    *{box-sizing:border-box}
    body{margin:0;padding:20px;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .container{max-width:1400px;margin:0 auto}
    .app-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:18px}
    .search-bar{display:flex;gap:10px;align-items:center}
    input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:6px;outline:none;width:180px;text-transform:uppercase}
    button{background:var(--primary);border:none;color:white;padding:10px 22px;border-radius:6px;font-weight:700;cursor:pointer}
    button:disabled{opacity:.55;cursor:not-allowed}
    .error{background:rgba(239,68,68,.12);border:1px solid var(--danger);color:var(--danger);padding:12px;border-radius:8px;margin:12px 0}
    .hidden{display:none !important}
    .dashboard{display:grid;grid-template-columns:350px minmax(0,1fr) 320px;gap:18px;align-items:start}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
    .symbol-header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:12px}
    .symbol-header h1{margin:0;font-size:26px}
    .symbol-header h2{margin:0;font-size:22px;color:var(--success)}
    h3{margin:10px 0 10px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px}
    .metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .metric .label{color:var(--muted);font-size:12px}
    .metric .value{font-weight:700}
    .table{width:100%;border-collapse:collapse;font-size:13px}
    .table th,.table td{padding:6px 0;border-bottom:1px solid var(--border);text-align:left}
    .chart-container{height:520px}
    #tv-chart{height:100%;border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .breakdown-list{list-style:none;padding:0;margin:0}
    .breakdown-list li{padding:10px 0;border-bottom:1px dashed var(--border);color:#cbd5e1}
    @media (max-width:1200px){.dashboard{grid-template-columns:1fr;}}
  </style>
</head>

<body>
  <div class="container">
    <div class="app-header">
      <h1>Stock Fundamentals Analyzer</h1>
      <div class="search-bar">
        <input id="ticker-input" placeholder="TICKER e.g. AAPL" autocomplete="off" />
        <button id="analyze-btn">Analyze</button>
      </div>
    </div>

    <div id="error-message" class="error hidden"></div>

    <div id="dashboard" class="dashboard hidden">
      <div class="panel">
        <div class="symbol-header">
          <div>
            <h1 id="stock-symbol">—</h1>
            <a id="stockanalysis-link" target="_blank" style="color:var(--primary);text-decoration:none;font-size:13px">View on StockAnalysis</a>
          </div>
          <h2 id="stock-price">—</h2>
        </div>

        <h3>Key metrics</h3>
        <div class="metrics-grid">
          <div class="metric"><div class="label">Market Cap</div><div class="value" id="val-mcap">—</div></div>
          <div class="metric"><div class="label">Div Yield</div><div class="value" id="val-div">—</div></div>
          <div class="metric"><div class="label">PE Trail</div><div class="value" id="val-pe-trail">—</div></div>
          <div class="metric"><div class="label">PE Fwd</div><div class="value" id="val-pe-fwd">—</div></div>
          <div class="metric"><div class="label">Debt/Equity</div><div class="value" id="val-de">—</div></div>
          <div class="metric"><div class="label">Price/Book</div><div class="value" id="val-pb">—</div></div>
        </div>

        <h3>Growth YoY</h3>
        <div class="metrics-grid">
          <div class="metric"><div class="label">Rev Growth TTM</div><div class="value" id="val-revg-ann">—</div></div>
          <div class="metric"><div class="label">Rev Growth Qtr</div><div class="value" id="val-revg-qtr">—</div></div>
          <div class="metric"><div class="label">EPS Growth TTM</div><div class="value" id="val-epsg-ann">—</div></div>
          <div class="metric"><div class="label">EPS Growth Qtr</div><div class="value" id="val-epsg-qtr">—</div></div>
        </div>

        <h3>EPS Hist (5Q)</h3>
        <table class="table" id="eps-table">
          <thead><tr><th>Quarter</th><th>EPS</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="color:var(--muted);font-size:13px">
            1Y High: <span id="val-1y-high" style="color:var(--success);font-weight:800">—</span>
            &nbsp;&nbsp; 1Y Low: <span id="val-1y-low" style="color:var(--danger);font-weight:800">—</span>
          </div>
          <div style="font-size:22px;font-weight:900">
            <span id="score-number">—</span> <span id="score-rating">—</span>
          </div>
        </div>
        <div class="chart-container">
          <div id="tv-chart"></div>
        </div>
      </div>

      <div class="panel">
        <h3>Score breakdown</h3>
        <ul id="score-breakdown-list" class="breakdown-list"></ul>
      </div>
    </div>
  </div>

  <!-- IMPORTANT: must load the external JS -->
  <script src="/app.js" defer></script>
</body>
</html>
